name: Build

# Builds the macOS app on every push / pull request so we always know
# whether the code compiles — even when there's no Mac handy to test on.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # The project targets macOS 26.5, so it needs the macOS 26 (Tahoe) SDK.
    # If this runner label is ever unavailable, switch to "macos-latest".
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep -i xcode || true

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Xcode & SDK info
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i macos || true

      - name: Build (no code signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project manather.xcodeproj \
            -scheme manather \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -skipMacroValidation
