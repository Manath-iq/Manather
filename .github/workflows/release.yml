name: Release

# Builds a Release version of the app, packages it as a .dmg and publishes it
# as a GitHub Release whenever a version tag (e.g. v0.1.0) is pushed. People can
# then just download the .dmg from the Releases page and run the app.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write # needed to create the release and upload the .dmg

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # The project targets a recent macOS SDK, so build on the macOS 26 runner.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Always build the exact commit that triggered the run: the tagged
          # commit for a tag push, or the branch HEAD for a manual dispatch.
          # (For dispatch the input tag may not exist yet — we create it below.)
          ref: ${{ github.sha }}

      - name: Resolve version
        id: ver
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build (Release, no code signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project manather.xcodeproj \
            -scheme manather \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            -skipMacroValidation

      - name: Package .dmg
        run: |
          set -e
          APP="build/Build/Products/Release/manather.app"
          test -d "$APP" || { echo "App not found at $APP"; exit 1; }
          # Ad-hoc sign so the app launches (after the Gatekeeper override).
          codesign --force --deep --sign - "$APP"
          STAGING="$(mktemp -d)"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          mkdir -p dist
          hdiutil create -volname "Manather" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "dist/Manather-${{ steps.ver.outputs.tag }}.dmg"
          ls -lh dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build the release notes. We pull the "What's new" section straight
          # from CHANGELOG.md for this version (heading like "## [0.1.4] — ...")
          # so every release has real, human-written notes instead of the same
          # boilerplate. The standard install steps are appended below it.
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${TAG#v}"   # strip the leading "v" -> matches CHANGELOG heading

          : > dist/notes.md
          if [ -f CHANGELOG.md ]; then
            # Print every line after the "## [VERSION]" heading until the next
            # "## " heading. awk handles this cleanly without sed/regex escaping.
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { grab=1; next }
              grab && /^## / { exit }
              grab { print }
            ' CHANGELOG.md > dist/changelog-section.md
          fi

          if [ -s dist/changelog-section.md ]; then
            echo "### What's new" >> dist/notes.md
            # Trim leading/trailing blank lines from the captured section.
            awk 'NF {p=1} p' dist/changelog-section.md >> dist/notes.md
            echo "" >> dist/notes.md
          fi

          # Install instructions live in a quoted heredoc so the apostrophe in
          # "isn't" doesn't trip up bash.
          cat >> dist/notes.md <<'EOF'
          ### Install
          1. Download the **.dmg** below.
          2. Open it and drag **Manather** into your Applications folder.
          3. First launch: the app isn't notarized by Apple, so macOS shows a
             warning. Right-click **Manather → Open → Open**, or go to
             **System Settings → Privacy & Security → Open Anyway**.

          _Apple Silicon (arm64) · macOS 14+ · see the full [CHANGELOG](https://github.com/Manath-iq/Manather/blob/main/CHANGELOG.md)._
          EOF

          gh release create "$TAG" dist/*.dmg \
            --title "Manather $TAG" \
            --notes-file dist/notes.md \
            --target "${{ github.sha }}"

      - name: Bump Homebrew cask
        # Pushes the new version + sha256 to the Manath-iq/homebrew-manather tap
        # so `brew install/upgrade --cask manather` always gets the latest release.
        # Auth is a deploy key scoped to ONLY the homebrew-manather repo (write),
        # stored as the repo secret HOMEBREW_TAP_DEPLOY_KEY — not a broad PAT, so a
        # leak can't touch any other repo. If the secret is absent the step quietly
        # no-ops, so releases never fail just because the tap automation isn't set up.
        env:
          TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          if [ -z "$TAP_DEPLOY_KEY" ]; then
            echo "HOMEBREW_TAP_DEPLOY_KEY secret not set — skipping cask update."
            exit 0
          fi
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${TAG#v}"
          DMG="dist/Manather-${TAG}.dmg"
          SHA="$(shasum -a 256 "$DMG" | awk '{print $1}')"
          echo "Bumping cask to ${VERSION} (sha256 ${SHA})"

          # Write the deploy key and route git's SSH through it (this repo only).
          KEY_FILE="$(mktemp)"
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          export GIT_SSH_COMMAND="ssh -i $KEY_FILE -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          git clone --depth 1 git@github.com:Manath-iq/homebrew-manather.git tap
          CASK="tap/Casks/manather.rb"

          # macOS runner uses BSD sed (the `-i ''` form).
          sed -i '' \
            -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" \
            "$CASK"

          cd tap
          if git diff --quiet; then
            echo "Cask already up to date — nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "manather ${VERSION}"
          git push
